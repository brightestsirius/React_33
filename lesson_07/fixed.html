<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      .fixed-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: #333;
        color: white;
        text-align: center;
        padding: 10px;
        z-index: 1000;
      }
      .content {
        padding: 50px;
        margin-top: 40px; /* Відступ для компенсації фіксованого заголовка */
        background-color: #f4f4f4;
      }
      .sticky-div {
        position: -webkit-sticky;
        position: sticky;
        top: 40px; /* Позиція, де прилиплий елемент стане фіксованим */
        background-color: yellow;
        padding: 10px;
        font-size: 20px;
        margin-top: 20px;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <div class="fixed-header">Fixed Header (Завжди вгорі)</div>

    <div class="content">
      <p>Деякий контент перед прилиплим блоком...</p>
      <div class="sticky-div">Sticky Div (Прилипає при прокрутці)</div>
      <p>Додатковий контент, що демонструє поведінку прилиплого блоку...</p>
      <div style="height: 1000px"></div>
      <p>Кінець контенту.</p>
    </div>

    <div style="height: 1000px"></div>
  </body>
</html>
